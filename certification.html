<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header><h1>Certification Program</h1></header>

<div class="container">

<div class="card">
  <h2>Enter Name</h2>
  <input id="name">
  <button onclick="certify()">Generate Certificate</button>

  <p id="output"></p>
</div>

</div>

<script>
function certify(){
  const name = document.getElementById("name").value;

  document.getElementById("output").innerHTML =
  name + " is now certified in Redirecting Responsibilities to Jared.";
}
</script>

</body>
</html>
